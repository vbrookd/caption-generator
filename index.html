<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaptionForge
AI Instagram Caption Generator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="hero">
<h1>CaptionForge</h1>
<p>Create Instagram captions instantly</p>
</header>

<main class="generator">

<select id="category">
<option value="travel">Travel</option>
<option value="fitness">Fitness</option>
<option value="food">Food</option>
<option value="business">Business</option>
<option value="coffee">Coffee</option>
<option value="selfie">Selfie</option>
</select>

<button onclick="generateCaption()">Generate Captions</button>

<button onclick="copyAll()">Copy All</button>

<div id="caption-container"></div>

</main>

<footer>
<footer>

<p>© CaptionForge – Free Instagram Caption Generator</p>

<div class="social-links">

<a href="https://instagram.com" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="https://facebook.com" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://twitter.com" target="_blank">
<i class="fa-brands fa-x-twitter"></i>
</a>

<a href="https://tiktok.com" target="_blank">
<i class="fa-brands fa-tiktok"></i>
</a>

</div>

</footer>
</footer>

<script src="script.js"></script>

</body>
</html>
